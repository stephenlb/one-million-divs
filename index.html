<style>
body, html, div {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #222;
    outline: none;
    border: none;
    gap: 0;
    row-gap: 0;
    column-gap: 0;
}
div#divs {
    display: grid;
    grid-template-columns: repeat(100, 1%);
    width: 100vw;
    height: 100vh;
    touch-action: none;
}

div#divs div {
    margin: -1px;
    background: #222;
}

/* color canvas */
div#colors {
    display: flex;
    position: absolute;
    top: 20px;
    right: 20px;
    min-width: 200px;
    gap: 4px;
    box-shadow: 1px 1px 20px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.1);
    padding: 8px;
    border-radius: 16px;
    backdrop-filter: blur(4px);
}

div#colors color {
    flex: 1;
    min-width: 30px;
    min-height: 30px;
    background-color: attr(hex type(<color>), red);
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 150ms cubic-bezier(.2,0,0,1);
}

div#colors color:active {
    scale: 1.4;
}
div#colors color.active {
    border: 2px solid white;
    box-shadow: 0 0 10px white;
    transform: scale(1.1);
}
</style>

<div id=divs>
    <!-- Divs appear here dynamicaly -->
</div>

<div id=colors>
    <color hex=#ff0000 class=active></color>
    <color hex=#00ff00></color>
    <color hex=#0000ff></color>
    <color hex=#ffff00></color>
    <color hex=#00ffff></color>
    <color hex=#ff00ff></color>
    <color hex=#4a412a></color>
</div>


<script src=pubnub.js></script>
<script>
const userId      = `userId-${Math.random()}.${Math.random()}`;
const channel     = 'one-million-divs';
const pubnub      = PubNub({userId: userId});
const divs        = document.getElementById("divs");
const cacheArr    = [];
const rainbowStep = 0.05;
let mouseDown     = false;
let colorSelected = null;

function makeRainbow(rainbowStep) {
    let t = 0;
    return function () {
        t += rainbowStep;
        const r = Math.sin(t) * 127 + 128;
        const g = Math.sin(t + 2 * Math.PI / 3) * 127 + 128;
        const b = Math.sin(t + 4 * Math.PI / 3) * 127 + 128;

        return `#${Math.round(r).toString(16).padStart(2, "0")}${Math.round(g).toString(16).padStart(2, "0")}${Math.round(b).toString(16).padStart(2, "0")}`;
    };
}
const nextColor = makeRainbow(rainbowStep);


function rngHex() {
    return (Math.ceil(Math.random()*128)+127).toString(16);
}

function broadcast(index, color) {
    pubnub.publish({
        channel : channel,
        message : {
            index : index,
            color : color,
        },
    });
}

function receiver(messages) {
    if (!Array.isArray(messages))
        messages = [messages];
    messages.forEach( msg => 
        colorize(msg.index, msg.color)
    );
}

pubnub.subscribe({
    channel: channel,
    messages: receiver,
});

let lastIndex = -1;
function motion(event) {
    event.preventDefault();

    // Only paint pixels if user has click held down
    if (event.type === 'pointerdown') mouseDown = true;
    if (event.type === 'pointerup') mouseDown = false;
    if (!mouseDown) return;

    // Get div index ID
    const index = getIndex(event);
    if (index < 0) return false;

    // Prevent dupliate transmissions
    if (lastIndex == index) return false;
    lastIndex = index;

    const color = colorSelected ? colorSelected : nextColor();

    // Transmit and colorize locally
    broadcast(index, color);
    colorize(index, color);
    return true;
}

function colorize(index, color) {
    const target = cacheArr[index];
    target.style.backgroundColor = color;
}

function getIndex(event) {
    const target = document.elementFromPoint(event.clientX, event.clientY);
    return cacheArr.indexOf(target)
}

let divOffest = 0;
function addMoreDivs(count=10000) {
    for(let i = 0; i<count; i++) {
        let div = document.createElement('div');
        divs.appendChild(div);
    }

    cacheArr.push.apply(cacheArr, Array.from(divs.children));
}
addMoreDivs();

divs.addEventListener('pointerdown', motion);
divs.addEventListener('pointerup', motion);
divs.addEventListener('pointermove', motion);

// Load history
(async () => {
    let timetoken = 0;
    for (let n = 0; n < 100; n++) {
        let response = await pubnub.history({
            channel: channel,
            start: timetoken,
            reverse: true,
        });
        if (!response) break;
        let events = response[0];
        if (!events || !events.length) break;
        timetoken = response[2];
        events.forEach(receiver);
    }
})();

// Color Picker
const colors = document.getElementById('colors');
colors.addEventListener( 'click', (event) => {
    const target = event.target;
    const color = target.getAttribute('hex');
    if (!color) return;
    colorSelected = color;
    document.querySelectorAll('#colors color').forEach(c => c.classList.remove('active'));
    target.classList.add('active');
});
</script>
